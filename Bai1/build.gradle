plugins {
    id 'java'
    id 'war'
}

group 'com.example'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

ext {
    junitVersion = '5.10.0' // Phiên bản ổn định cho Java 17
}

// CẬP NHẬT: Spring 6 yêu cầu Java 17 trở lên
sourceCompatibility = '17'
targetCompatibility = '17'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

dependencies {
    // 1. Nâng cấp lên Spring 6.1.x (Hỗ trợ Jakarta EE)
    implementation 'org.springframework:spring-webmvc:6.1.1'

    // 2. Sử dụng Jakarta Servlet API thay cho javax (Cho Tomcat 10+)
    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.0.0'

    // 3. Hỗ trợ JSP cho Jakarta
    compileOnly 'jakarta.servlet.jsp:jakarta.servlet.jsp-api:3.1.1'

    testImplementation("org.junit.jupiter:junit-jupiter-api:${junitVersion}")
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:${junitVersion}")
}

test {
    useJUnitPlatform()
}